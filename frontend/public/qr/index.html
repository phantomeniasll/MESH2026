<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BeTree — Demo QR Codes</title>
<style>
  body { font-family: sans-serif; background: #FEF9E0; padding: 24px; }
  h1 { color: #1B5732; font-size: 1.5rem; margin-bottom: 8px; }
  p { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .card { background: white; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e0dcc8; }
  .card img { width: 160px; height: 160px; }
  .card p { margin: 8px 0 0; color: #1B5732; font-weight: 600; font-size: 0.9rem; }
</style>
</head>
<body>
<h1>🌳 BeTree — Demo QR Codes</h1>
<p>Scan these codes with the BeTree app to test the watering flow.</p>
<div class="grid">
  <div class="card">
    <img src="KA-00001.png" alt="KA-00001">
    <p>KA-00001</p>
    <small style="color:#888;font-size:0.75rem">Tilia cordata · Innenstadt</small>
  </div>
  <div class="card">
    <img src="KA-00042.png" alt="KA-00042">
    <p>KA-00042</p>
    <small style="color:#888;font-size:0.75rem">Acer platanoides · Südstadt</small>
  </div>
  <div class="card">
    <img src="KA-00137.png" alt="KA-00137">
    <p>KA-00137</p>
    <small style="color:#888;font-size:0.75rem">Quercus robur · Durlach</small>
  </div>
  <div class="card">
    <img src="KA-00200.png" alt="KA-00200">
    <p>KA-00200</p>
    <small style="color:#888;font-size:0.75rem">Betula pendula · Mühlburg</small>
  </div>
  <div class="card">
    <img src="KA-00299.png" alt="KA-00299">
    <p>KA-00299</p>
    <small style="color:#888;font-size:0.75rem">Sorbus aucuparia · Waldstadt</small>
  </div>
</div>
</body>
</html>
