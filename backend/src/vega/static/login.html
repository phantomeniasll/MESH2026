<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Tree — Login</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 400px;
  }
  .logo {
    text-align: center; font-size: 3rem; margin-bottom: 8px;
  }
  h1 {
    text-align: center; font-size: 1.5rem; font-weight: 700;
    color: var(--green); margin-bottom: 4px;
  }
  .subtitle {
    text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 32px;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block; font-size: 0.8rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
  }
  input {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; font-size: 1rem;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--green); }
  .btn {
    width: 100%; background: var(--green); color: #000;
    border: none; border-radius: 8px; padding: 14px;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: opacity 0.2s; margin-top: 8px;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    background: rgba(248,81,73,0.12); border: 1px solid rgba(248,81,73,0.3);
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem;
    color: var(--red); margin-top: 12px; display: none;
  }
  .footer {
    text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--muted);
  }
  .footer a { color: var(--green); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
  .divider {
    border: none; border-top: 1px solid var(--border); margin: 24px 0;
  }
  .demo-hint {
    background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.2);
    border-radius: 8px; padding: 12px 14px; font-size: 0.82rem; color: var(--muted);
    margin-bottom: 20px;
  }
  .demo-hint strong { color: var(--green); }
  .demo-users {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .demo-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 0.75rem;
    cursor: pointer; transition: border-color 0.2s;
  }
  .demo-chip:hover { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🌳</div>
  <h1>Be Tree</h1>
  <p class="subtitle">Karlsruhe Baumhüter — Login</p>

  <div class="demo-hint">
    <strong>Demo accounts</strong> — klicke auf einen Namen:
    <div class="demo-users" id="demoUsers"></div>
  </div>

  <div class="field">
    <label for="username">Benutzername</label>
    <input id="username" type="text" placeholder="dein_benutzername" autocomplete="username" autocapitalize="none" spellcheck="false">
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Einloggen</button>
  <div class="error" id="errorMsg"></div>

  <hr class="divider">
  <div class="footer">
    Noch kein Konto? <a href="/register">Jetzt registrieren</a>
  </div>
</div>

<script>
const DEMO = [
  'emma_mueller','leon_wagner','hannah_klein','mia_fischer',
  'sofia_hoffmann','noah_schneider','max_richter','luca_becker'
];

const demoEl = document.getElementById('demoUsers');
DEMO.forEach(u => {
  const chip = document.createElement('span');
  chip.className = 'demo-chip';
  chip.textContent = u;
  chip.onclick = () => {
    document.getElementById('username').value = u;
    doLogin();
  };
  demoEl.appendChild(chip);
});

document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!username) {
    showError('Bitte Benutzernamen eingeben.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Einloggen…';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/citizens/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });

    if (res.status === 404) {
      showError('Benutzername nicht gefunden. Bitte registrieren.');
      return;
    }
    if (!res.ok) {
      showError('Fehler beim Einloggen. Bitte erneut versuchen.');
      return;
    }

    const user = await res.json();
    localStorage.setItem('betree_user_id', user.id);
    localStorage.setItem('betree_username', user.username || username);
    localStorage.setItem('betree_display_name', user.display_name);
    window.location.href = '/profile';
  } catch (e) {
    showError('Netzwerkfehler. Ist der Server erreichbar?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Einloggen';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}

// Redirect if already logged in
if (localStorage.getItem('betree_user_id')) {
  window.location.href = '/profile';
}
</script>
</body>
</html>
