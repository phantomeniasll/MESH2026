<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be Tree — Mein Profil</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e;
    --green: #3fb950; --yellow: #d2991d; --red: #f85149; --blue: #58a6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100dvh;
  }

  /* Nav */
  .nav {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .nav-logo { font-size: 1.2rem; font-weight: 700; color: var(--green); }
  .nav-links { display: flex; gap: 4px; }
  .nav-link {
    color: var(--muted); text-decoration: none; font-size: 0.82rem;
    padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
  }
  .nav-link:hover, .nav-link.active { background: rgba(63,185,80,0.1); color: var(--green); }
  .nav-logout {
    color: var(--muted); background: none; border: none;
    font-size: 0.82rem; cursor: pointer; padding: 6px 10px;
    border-radius: 6px; transition: all 0.2s;
  }
  .nav-logout:hover { color: var(--red); background: rgba(248,81,73,0.08); }

  .container { max-width: 640px; margin: 0 auto; padding: 20px 16px; }

  /* Profile header */
  .profile-header {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
    display: flex; gap: 20px; align-items: center;
  }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, #3fb950, #1a6e28);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: 700; color: #fff; flex-shrink: 0;
    border: 3px solid var(--green);
  }
  .profile-info { flex: 1; min-width: 0; }
  .profile-name { font-size: 1.3rem; font-weight: 700; }
  .profile-username { color: var(--muted); font-size: 0.85rem; margin: 2px 0 6px; }
  .profile-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-chip {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; color: var(--muted);
  }
  .level-badge {
    background: linear-gradient(135deg, #d2991d, #f0c040);
    color: #000; border: none; border-radius: 20px; padding: 3px 10px;
    font-size: 0.75rem; font-weight: 700;
  }

  /* Stats grid */
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; text-align: center;
  }
  .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--green); line-height: 1; }
  .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Level progress */
  .level-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 16px;
  }
  .level-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .level-title { font-size: 0.85rem; font-weight: 600; }
  .level-pts { font-size: 0.8rem; color: var(--muted); }
  .progress-bar {
    height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #3fb950, #7ee787);
    border-radius: 4px; transition: width 0.6s ease;
  }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto; }
  .tab {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 14px; font-size: 0.85rem; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab.active { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Section card */
  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
  }
  .section-title {
    font-size: 0.75rem; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 12px;
  }

  /* Badges */
  .badges-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px; font-size: 0.85rem;
  }
  .badge-icon { font-size: 1.2rem; }
  .badge-name { font-weight: 600; }

  /* Waterings list */
  .watering-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .watering-row:last-child { border-bottom: none; }
  .watering-icon { font-size: 1.2rem; flex-shrink: 0; }
  .watering-info { flex: 1; min-width: 0; }
  .watering-tree { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .watering-date { font-size: 0.75rem; color: var(--muted); }
  .watering-pts { font-size: 0.85rem; font-weight: 600; color: var(--green); }

  /* Favorites */
  .fav-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .fav-row:last-child { border-bottom: none; }
  .fav-icon { font-size: 1.2rem; flex-shrink: 0; }
  .fav-info { flex: 1; }
  .fav-name { font-size: 0.9rem; font-weight: 500; }
  .fav-sub { font-size: 0.75rem; color: var(--muted); }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .status-healthy { background: var(--green); }
  .status-stressed { background: var(--yellow); }
  .status-critical { background: var(--red); animation: pulse 1.5s infinite; }
  .status-unknown { background: var(--border); }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  .empty { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 20px 0; }

  .action-bar {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .action-btn {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 12px;
    font-size: 0.85rem; cursor: pointer; text-align: center;
    text-decoration: none; transition: all 0.2s; display: block;
  }
  .action-btn:hover { border-color: var(--green); color: var(--green); }
  .action-btn.primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
  .action-btn.primary:hover { opacity: 0.85; }

  .loading { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-logo">🌳 Be Tree</span>
  <div class="nav-links">
    <a href="/profile" class="nav-link active">Profil</a>
    <a href="/impact" class="nav-link">Impact</a>
    <a href="/citizen-map" class="nav-link">Karte</a>
    <button class="nav-logout" onclick="logout()">Abmelden</button>
  </div>
</nav>

<div class="container" id="app">
  <div class="loading">🌱 Lade Profil…</div>
</div>

<script>
const BADGE_META = {
  first_drop:        { name: 'First Drop', icon: '💧', desc: 'Erster Baum gegossen' },
  early_bird:        { name: 'Early Bird', icon: '🌅', desc: 'Vor 7 Uhr morgens gegossen' },
  heat_wave_hero:    { name: 'Hitzewellen-Held', icon: '🦸', desc: '3 Tage in Folge bei Hitze' },
  sniper:            { name: 'Sniper', icon: '🎯', desc: 'Dürrendstem Baum geholfen' },
  neighborhood_king: { name: 'Nachbarschaftskönig', icon: '👑', desc: 'Spitze im Stadtviertel' },
  centurion:         { name: 'Centurion', icon: '💯', desc: '100 Bewässerungen' },
  night_owl:         { name: 'Nachteule', icon: '🦉', desc: 'Nach 22 Uhr gegossen' },
  paparazzo:         { name: 'Paparazzo', icon: '📸', desc: '10 Baumfotos hochgeladen' },
  recruiter:         { name: 'Recruiter', icon: '🤝', desc: 'Freund eingeladen' },
};

const STATUS_LABELS = { healthy: 'Gesund', stressed: 'Gestresst', critical: 'Kritisch', unknown: 'Unbekannt' };

let userId = localStorage.getItem('betree_user_id');
if (!userId) window.location.href = '/login';

function logout() {
  localStorage.removeItem('betree_user_id');
  localStorage.removeItem('betree_username');
  localStorage.removeItem('betree_display_name');
  window.location.href = '/login';
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

function levelThreshold(level) {
  return (level * level) * 100;
}

function relDate(iso) {
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 86400000);
  if (diff === 0) return 'heute';
  if (diff === 1) return 'gestern';
  return `vor ${diff} Tagen`;
}

function statusClass(s) {
  const m = { healthy: 'status-healthy', stressed: 'status-stressed', critical: 'status-critical' };
  return m[s] || 'status-unknown';
}

async function loadProfile() {
  const [profile, waterings] = await Promise.all([
    fetch(`/api/citizens/profile/${userId}`).then(r => r.json()),
    fetch(`/api/citizens/leaderboard?limit=100`).then(r => r.json()).catch(() => []),
  ]);
  return { profile, waterings };
}

async function loadFavorites(favoriteIds) {
  if (!favoriteIds.length) return [];
  const results = await Promise.all(
    favoriteIds.map(id => fetch(`/api/trees/${id}`).then(r => r.ok ? r.json() : null).catch(() => null))
  );
  return results.filter(Boolean);
}

async function loadRecentWaterings() {
  const lb = await fetch(`/api/citizens/leaderboard?limit=100`).then(r => r.json()).catch(() => []);
  return lb;
}

function render(profile, favTrees) {
  const pts = profile.total_points;
  const lvl = profile.level;
  const prevThreshold = ((lvl - 1) * (lvl - 1)) * 100;
  const nextThreshold = levelThreshold(lvl);
  const ptsInLevel = pts - prevThreshold;
  const ptsNeeded = nextThreshold - prevThreshold;
  const pct = Math.min(100, Math.round((ptsInLevel / ptsNeeded) * 100));

  const badgesHtml = profile.badges.length
    ? profile.badges.map(bid => {
        const m = BADGE_META[bid] || { name: bid, icon: '🏅', desc: '' };
        return `<div class="badge-item"><span class="badge-icon">${m.icon}</span><div><div class="badge-name">${m.name}</div><div style="font-size:0.75rem;color:var(--muted)">${m.desc}</div></div></div>`;
      }).join('')
    : '<div class="empty">Noch keine Abzeichen</div>';

  const favsHtml = favTrees.length
    ? favTrees.map(t => `
        <div class="fav-row">
          <span class="fav-icon">🌳</span>
          <div class="fav-info">
            <div class="fav-name">${t.name}</div>
            <div class="fav-sub">${t.neighborhood || ''} ${t.address ? '· ' + t.address : ''}</div>
          </div>
          <div class="status-dot ${statusClass(t.status)}" title="${STATUS_LABELS[t.status] || t.status}"></div>
        </div>`).join('')
    : '<div class="empty">Noch keine Favoriten — füge Bäume auf der Karte hinzu.</div>';

  const savedTab = localStorage.getItem('betree_profile_tab') || 'badges';

  document.getElementById('app').innerHTML = `
    <div class="profile-header">
      <div class="avatar">${initials(profile.display_name)}</div>
      <div class="profile-info">
        <div class="profile-name">${profile.display_name}</div>
        <div class="profile-username">@${profile.username || '—'}</div>
        <div class="profile-meta">
          ${profile.neighborhood ? `<span class="meta-chip">📍 ${profile.neighborhood}</span>` : ''}
          <span class="level-badge">Level ${profile.level}</span>
          <span class="meta-chip">🔥 ${profile.current_streak} Tage</span>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">${pts.toLocaleString('de-DE')}</div>
        <div class="stat-label">Punkte</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${profile.waterings_count}</div>
        <div class="stat-label">Bewässerungen</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${profile.trees_adopted}</div>
        <div class="stat-label">Adoptiert</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${profile.longest_streak}</div>
        <div class="stat-label">Längste Serie</div>
      </div>
    </div>

    <div class="level-card">
      <div class="level-header">
        <span class="level-title">⚡ Level ${lvl} → ${lvl + 1}</span>
        <span class="level-pts">${ptsInLevel} / ${ptsNeeded} Punkte</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="action-bar">
      <a href="/citizen-map" class="action-btn primary">🗺️ Zur Karte</a>
      <a href="/impact" class="action-btn">📊 Mein Impact</a>
    </div>

    <div class="tabs">
      <button class="tab ${savedTab === 'badges' ? 'active' : ''}" onclick="switchTab('badges')">🏅 Abzeichen</button>
      <button class="tab ${savedTab === 'favorites' ? 'active' : ''}" onclick="switchTab('favorites')">❤️ Favoriten</button>
    </div>

    <div id="tab-badges" class="tab-panel ${savedTab === 'badges' ? 'active' : ''}">
      <div class="section">
        <div class="section-title">Verdiente Abzeichen</div>
        <div class="badges-grid">${badgesHtml}</div>
      </div>
    </div>

    <div id="tab-favorites" class="tab-panel ${savedTab === 'favorites' ? 'active' : ''}">
      <div class="section">
        <div class="section-title">Meine Lieblingsbäume</div>
        ${favsHtml}
      </div>
    </div>
  `;
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab-panel#tab-${name}`).classList.add('active');
  event.target.classList.add('active');
  localStorage.setItem('betree_profile_tab', name);
}

async function init() {
  try {
    const res = await fetch(`/api/citizens/profile/${userId}`);
    if (res.status === 404) { logout(); return; }
    const profile = await res.json();
    const favTrees = await loadFavorites(profile.favorite_trees || []);
    render(profile, favTrees);
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Fehler beim Laden des Profils.</div>';
  }
}

init();
</script>
</body>
</html>
