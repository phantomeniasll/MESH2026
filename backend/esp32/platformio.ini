; =============================================================================
; Wurzelwerk — PlatformIO build config (dual-node architecture)
; =============================================================================
;
;   platformio run -e mesh_node    → low-power ESP-NOW sender
;   platformio run -e full_node    → always-on WiFi ↔ ESP-NOW bridge
;   platformio run                 → builds both
;
; Shared: board, framework, monitor speed, sensor library.

[platformio]
default_envs = mesh_node, full_node

[common]
platform    = espressif32
board       = esp32dev
framework   = arduino
monitor_speed = 115200
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6

; ── Low-power mesh node: ESP-NOW sender + deep sleep ────────────
[env:mesh_node]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port  = COM6
monitor_port = COM6
lib_deps     = ${common.lib_deps}
build_flags  =
    -D NODE_TYPE_MESH

; ── Full node (gateway): WiFi + HTTP POST + ESP-NOW receiver ────
[env:full_node]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
upload_port  = COM5
monitor_port = COM5
lib_deps     = ${common.lib_deps}
build_flags  =
    -D NODE_TYPE_FULL
